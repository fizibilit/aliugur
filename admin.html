<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Ali Uğur Özkeleş</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
:root{--navy:#0d1b2a;--gold:#c9a84c;--red:#e53e3e;--green:#38a169}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d1b2a}
.login-box{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:1.3rem;color:#0d1b2a;margin-bottom:.4rem}
.login-box p{font-size:.85rem;color:#666;margin-bottom:1.8rem}

input[type=password],input[type=text],input[type=url],textarea,select{
  width:100%;padding:.7rem 1rem;border:1.5px solid #e2e8f0;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border .2s;background:#fff;color:#1a1a1a}
input:focus,textarea:focus,select:focus{border-color:#c9a84c}
textarea{resize:vertical;min-height:100px}

.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.4rem;border:none;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#0d1b2a;color:#fff}.btn-primary:hover{background:#1a2d40}
.btn-gold{background:#c9a84c;color:#fff}.btn-gold:hover{background:#b8943d}
.btn-red{background:#fff;color:#e53e3e;border:1.5px solid #e53e3e}.btn-red:hover{background:#fff5f5}
.btn-green{background:#38a169;color:#fff}.btn-green:hover{background:#2f8a59}
.btn-sm{padding:.4rem .85rem;font-size:.8rem}

#app{display:none}
header{background:#0d1b2a;color:#fff;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.1rem;font-weight:600}
.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

.tabs{display:flex;gap:.5rem;margin-bottom:2rem;border-bottom:2px solid #e2e8f0}
.tab{padding:.6rem 1.2rem;border:none;background:none;font-family:'Inter',sans-serif;font-size:.9rem;
  font-weight:500;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:#0d1b2a;border-bottom-color:#c9a84c;font-weight:600}

.settings-box{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #e2e8f0}
.settings-box h3{font-size:.9rem;font-weight:600;margin-bottom:1rem;color:#0d1b2a}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.8rem;font-weight:600;color:#444;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em}

.card-list{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.5rem}
.card{background:#fff;border-radius:12px;padding:1.2rem 1.4rem;border:1px solid #e2e8f0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.card-info{flex:1}
.card-title{font-weight:600;font-size:.95rem;color:#0d1b2a;margin-bottom:.2rem}
.card-meta{font-size:.78rem;color:#888}
.card-actions{display:flex;gap:.5rem;flex-shrink:0}
.badge{display:inline-block;font-size:.7rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;
  background:#c9a84c22;color:#b8943d;margin-left:.5rem}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:560px;margin:auto}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;color:#0d1b2a}
.modal-footer{display:flex;gap:.8rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid #e2e8f0}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0d1b2a;color:#fff;padding:.8rem 1.4rem;
  border-radius:8px;font-size:.88rem;z-index:9999;transform:translateY(100px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#38a169}
.toast.error{background:#e53e3e}

.info-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:.8rem 1rem;font-size:.82rem;color:#92400e;margin-bottom:1rem}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Admin Paneli</h1>
    <p>Ali Uğur Özkeleş — İçerik Yönetimi</p>
    <div class="field">
      <label>Şifre</label>
      <input type="password" id="pwd-input" placeholder="Şifrenizi girin" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" onclick="doLogin()">Giriş Yap</button>
    <p id="login-error" style="color:#e53e3e;font-size:.82rem;margin-top:.8rem;display:none">Şifre yanlış.</p>
  </div>
</div>

<div id="app">
  <header>
    <h1>⚙ Admin Paneli</h1>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="logout()">Çıkış</button>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('articles')">📝 Yazılar</button>
      <button class="tab" onclick="showTab('videos')">🎬 Videolar</button>
      <button class="tab" onclick="showTab('settings')">⚙ Ayarlar</button>
    </div>

    <!-- ARTICLES -->
    <div id="tab-articles">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 style="font-size:1rem;font-weight:600">Yazılar</h2>
        <button class="btn btn-gold" onclick="openArticleModal()">+ Yeni Yazı</button>
      </div>
      <div class="card-list" id="articles-list"></div>
      <button class="btn btn-green" onclick="saveToFile()" style="width:100%;justify-content:center">
        💾 Kaydet &amp; Yayınla
      </button>
      <div id="save-status" style="margin-top:.6rem;font-size:.82rem;display:none"></div>
    </div>

    <!-- VIDEOS -->
    <div id="tab-videos" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 style="font-size:1rem;font-weight:600">Videolar</h2>
        <button class="btn btn-gold" onclick="openVideoModal()">+ Yeni Video</button>
      </div>
      <div class="card-list" id="videos-list"></div>
      <button class="btn btn-green" onclick="saveToFile()" style="width:100%;justify-content:center">
        💾 Kaydet &amp; Yayınla
      </button>
      <div id="save-status-v" style="margin-top:.6rem;font-size:.82rem;display:none"></div>
    </div>

    <!-- SETTINGS -->
    <div id="tab-settings" style="display:none">
      <div class="settings-box">
        <h3>Ayarlar</h3>
        <div class="field">
          <label>Şifreyi Değiştir</label>
          <input type="password" id="new-pwd" placeholder="Yeni şifre"/>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Kaydet</button>
      </div>
      <div class="settings-box">
        <h3>Mevcut content.json'u Yükle</h3>
        <p style="font-size:.82rem;color:#666;margin-bottom:.8rem">Başka bir cihazda düzenlendiyse güncel dosyayı buradan yükleyin.</p>
        <input type="file" id="import-file" accept=".json" onchange="importContent(this)"/>
      </div>
    </div>
  </div>
</div>

<!-- ARTICLE MODAL -->
<div class="modal-overlay" id="article-modal">
  <div class="modal">
    <h2 id="article-modal-title">Yeni Yazı</h2>
    <input type="hidden" id="a-id"/>
    <div class="field"><label>Başlık</label><input type="text" id="a-title" placeholder="Yazı başlığı"/></div>
    <div class="field"><label>Tarih</label><input type="text" id="a-date" placeholder="15 Ocak 2024"/></div>
    <div class="field">
      <label>Kapak Resmi (opsiyonel)</label>
      <input type="file" id="a-image-file" accept="image/*" onchange="previewImage(this)" style="padding:.4rem"/>
      <div id="a-image-preview" style="margin-top:.5rem;display:none">
        <img id="a-image-thumb" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px"/>
        <button type="button" onclick="clearImage()" style="margin-top:.3rem;font-size:.75rem;color:#e53e3e;background:none;border:none;cursor:pointer">✕ Resmi kaldır</button>
      </div>
      <input type="hidden" id="a-image"/>
    </div>
    <div class="field"><label>Yazı Metni</label><textarea id="a-content" placeholder="Yazının tam metni..." style="min-height:240px"></textarea></div>
    <div class="field"><label>Kaynak Link (opsiyonel)</label><input type="url" id="a-url" placeholder="https://haberdurus.com/..."/></div>
    <div class="field">
      <label>Öne Çıkan?</label>
      <select id="a-featured">
        <option value="false">Hayır</option>
        <option value="true">Evet — Büyük kart olarak göster</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-red btn-sm" onclick="closeModal('article-modal')">İptal</button>
      <button class="btn btn-gold" onclick="saveArticle()">Kaydet</button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="video-modal">
  <div class="modal">
    <h2 id="video-modal-title">Yeni Video</h2>
    <input type="hidden" id="v-id"/>
    <div class="field"><label>Başlık</label><input type="text" id="v-title" placeholder="Video başlığı"/></div>
    <div class="field"><label>Tarih</label><input type="text" id="v-date" placeholder="2024"/></div>
    <div class="field"><label>Özet</label><textarea id="v-summary" placeholder="Videonun kısa açıklaması..."></textarea></div>
    <div class="field"><label>YouTube URL</label><input type="url" id="v-url" placeholder="https://www.youtube.com/watch?v=..."/></div>
    <div class="modal-footer">
      <button class="btn btn-red btn-sm" onclick="closeModal('video-modal')">İptal</button>
      <button class="btn btn-gold" onclick="saveVideo()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_PWD = 'aliugur2024';
let content = { articles: [], videos: [] };

// AUTH
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const stored = localStorage.getItem('admin_pwd') || DEFAULT_PWD;
  if (pwd === stored) {
    localStorage.setItem('admin_logged','1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function logout() { localStorage.removeItem('admin_logged'); location.reload(); }

// INIT — her zaman content.json'dan oku
async function init() {
  try {
    const r = await fetch('./content.json?t=' + Date.now());
    content = await r.json();
  } catch(e) {
    const saved = localStorage.getItem('admin_content');
    if (saved) { try { content = JSON.parse(saved); } catch(e2){} }
  }
  renderAll();
}

function persist() {
  localStorage.setItem('admin_content', JSON.stringify(content));
}

// TABS
function showTab(name) {
  ['articles','videos','settings'].forEach((t,i) => {
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===name);
  });
}

// RENDER
function renderAll() { renderArticles(); renderVideos(); }

function renderArticles() {
  const el = document.getElementById('articles-list');
  if (!content.articles.length) { el.innerHTML='<p style="color:#888;font-size:.85rem">Henüz yazı yok.</p>'; return; }
  el.innerHTML = content.articles.map(a => `
    <div class="card">
      <div class="card-info">
        <div class="card-title">${a.title}${a.featured?'<span class="badge">Öne Çıkan</span>':''}</div>
        <div class="card-meta">${a.date}${a.image?' · 🖼 Resimli':''}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="editArticle(${a.id})" style="border:1.5px solid #e2e8f0">Düzenle</button>
        <button class="btn btn-red btn-sm" onclick="deleteArticle(${a.id})">Sil</button>
      </div>
    </div>`).join('');
}

function renderVideos() {
  const el = document.getElementById('videos-list');
  if (!content.videos.length) { el.innerHTML='<p style="color:#888;font-size:.85rem">Henüz video yok.</p>'; return; }
  el.innerHTML = content.videos.map(v => `
    <div class="card">
      <div class="card-info">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">${v.date}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="editVideo(${v.id})" style="border:1.5px solid #e2e8f0">Düzenle</button>
        <button class="btn btn-red btn-sm" onclick="deleteVideo(${v.id})">Sil</button>
      </div>
    </div>`).join('');
}

// IMAGE
function previewImage(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('a-image-thumb').src = e.target.result;
    document.getElementById('a-image').value = e.target.result;
    document.getElementById('a-image-preview').style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}
function clearImage() {
  document.getElementById('a-image-file').value = '';
  document.getElementById('a-image').value = '';
  document.getElementById('a-image-preview').style.display = 'none';
}

// ARTICLE CRUD
function openArticleModal(article=null) {
  document.getElementById('article-modal-title').textContent = article ? 'Yazıyı Düzenle' : 'Yeni Yazı';
  document.getElementById('a-id').value = article ? article.id : '';
  document.getElementById('a-title').value = article ? article.title : '';
  document.getElementById('a-date').value = article ? article.date : '';
  document.getElementById('a-content').value = article ? (article.content||'') : '';
  document.getElementById('a-url').value = article ? (article.url||'') : '';
  document.getElementById('a-featured').value = article ? String(article.featured) : 'false';
  document.getElementById('a-image').value = article ? (article.image||'') : '';
  document.getElementById('a-image-file').value = '';
  if (article && article.image) {
    document.getElementById('a-image-thumb').src = article.image;
    document.getElementById('a-image-preview').style.display = 'block';
  } else {
    document.getElementById('a-image-preview').style.display = 'none';
  }
  document.getElementById('article-modal').classList.add('open');
}
function editArticle(id) { openArticleModal(content.articles.find(a=>a.id===id)); }

function saveArticle() {
  const id = document.getElementById('a-id').value;
  const title = document.getElementById('a-title').value.trim();
  if (!title) { showToast('Başlık zorunlu','error'); return; }
  const article = {
    id: id ? parseInt(id) : Date.now(),
    title,
    date: document.getElementById('a-date').value.trim(),
    content: document.getElementById('a-content').value.trim(),
    url: document.getElementById('a-url').value.trim(),
    featured: document.getElementById('a-featured').value === 'true',
    image: document.getElementById('a-image').value
  };
  if (id) { const i=content.articles.findIndex(a=>a.id===parseInt(id)); content.articles[i]=article; }
  else { content.articles.push(article); }
  persist();
  closeModal('article-modal');
  renderArticles();
  showToast('Yazı kaydedildi ✓');
}
function deleteArticle(id) {
  if (!confirm('Silmek istediğinizden emin misiniz?')) return;
  content.articles = content.articles.filter(a=>a.id!==id);
  persist(); renderArticles(); showToast('Yazı silindi');
}

// VIDEO CRUD
function openVideoModal(video=null) {
  document.getElementById('video-modal-title').textContent = video ? 'Videoyu Düzenle' : 'Yeni Video';
  document.getElementById('v-id').value = video ? video.id : '';
  document.getElementById('v-title').value = video ? video.title : '';
  document.getElementById('v-date').value = video ? video.date : '';
  document.getElementById('v-summary').value = video ? video.summary : '';
  document.getElementById('v-url').value = video ? video.url : '';
  document.getElementById('video-modal').classList.add('open');
}
function editVideo(id) { openVideoModal(content.videos.find(v=>v.id===id)); }

function saveVideo() {
  const id = document.getElementById('v-id').value;
  const title = document.getElementById('v-title').value.trim();
  if (!title) { showToast('Başlık zorunlu','error'); return; }
  const urlVal = document.getElementById('v-url').value.trim();
  const m = urlVal.match(/(?:v=|live\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  const video = {
    id: id ? parseInt(id) : Date.now(),
    title, date: document.getElementById('v-date').value.trim(),
    summary: document.getElementById('v-summary').value.trim(),
    url: urlVal, youtube_id: m ? m[1] : ''
  };
  if (id) { const i=content.videos.findIndex(v=>v.id===parseInt(id)); content.videos[i]=video; }
  else { content.videos.push(video); }
  persist(); closeModal('video-modal'); renderVideos(); showToast('Video kaydedildi ✓');
}
function deleteVideo(id) {
  if (!confirm('Silmek istediğinizden emin misiniz?')) return;
  content.videos = content.videos.filter(v=>v.id!==id);
  persist(); renderVideos(); showToast('Video silindi');
}

async function saveToFile() {
  const statusEls = ['save-status','save-status-v'].map(id=>document.getElementById(id));
  statusEls.forEach(el=>{el.style.display='block';el.style.color='#d97706';el.textContent='⏳ Kaydediliyor...';});
  try {
    const res = await fetch('http://localhost:3031/save-content', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(content, null, 2)
    });
    if (res.ok) {
      statusEls.forEach(el=>{el.style.color='#38a169';el.textContent='✅ Kaydedildi! Session kapanınca otomatik yayınlanacak.';});
      showToast('Kaydedildi ✓','success');
    } else { throw new Error(); }
  } catch(e) {
    statusEls.forEach(el=>{el.style.color='#e53e3e';el.textContent='❌ Sunucu yanıt vermedi.';});
    showToast('Hata','error');
  }
}

function downloadContent() {
  const json = JSON.stringify(content, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'content.json';
  a.click();
}

// IMPORT
function importContent(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      content = JSON.parse(e.target.result);
      persist(); renderAll(); showToast('İçerik yüklendi ✓','success');
    } catch(e) { showToast('Geçersiz JSON dosyası','error'); }
  };
  reader.readAsText(input.files[0]);
}

// SETTINGS
function saveSettings() {
  const pwd = document.getElementById('new-pwd').value.trim();
  if (pwd) { localStorage.setItem('admin_pwd', pwd); showToast('Şifre güncellendi ✓'); }
}

// UTILS
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(()=>t.className='toast', 3500);
}

// STARTUP
if (localStorage.getItem('admin_logged')==='1') {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}
document.getElementById('pwd-input').addEventListener('keydown', e=>e.key==='Enter'&&doLogin());
</script>
</body>
</html>
